name: Test Web

on:
  push:
    branches: [main, feat/*, feature/*]
    paths:
      - "web/**"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:

concurrency:
  group: test-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: "web/.nvmrc"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      # corepack must run AFTER setup-node so shims land in the Node install
      # actually on PATH. Running it earlier adds shims to a Node installation
      # that setup-node then replaces, leaving `pnpm: command not found`.
      - name: Enable corepack (activates pnpm from packageManager field)
        run: corepack enable

      - name: Install web deps
        run: cd web && pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: cd web && pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: cd web && pnpm test:e2e

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: web/test-results/
          retention-days: 7
